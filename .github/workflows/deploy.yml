name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: DATABASE_URL,OPENROUTER_API_KEY,GOOGLE_MAPS_API_KEY,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,SMTP_FROM,SMTP_EHLO_DOMAIN,APP_BASE_URL_PROD,NODE_ENV
          script: |
            cd /var/www/lamaapp
            git fetch origin main && git reset --hard origin/main
            chmod +x deploy.sh
            APP_INSTANCE=main APP_ROOT=/var/www/lamaapp ./deploy.sh
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_EHLO_DOMAIN: ${{ secrets.SMTP_EHLO_DOMAIN }}
          APP_BASE_URL_PROD: ${{ secrets.APP_BASE_URL_PROD }}
          NODE_ENV: production