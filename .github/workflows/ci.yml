name: CI

on:
  push:
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./apps/api/prisma/ci.db
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare sqlite schema
        run: npx prisma db push --schema apps/api/prisma/schema.prisma --skip-generate

      - name: Build all packages
        run: npm run build

      - name: Start API
        run: |
          node apps/api/dist/index.js > api.log 2>&1 &
          echo $! > api.pid

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:3000/health > /dev/null; then
              echo "API is up"
              exit 0
            fi
            sleep 2
          done
          echo "API did not start in time"
          cat api.log
          exit 1

      - name: Smoke check
        run: npm run smoke

      - name: Print API logs on failure
        if: failure()
        run: cat api.log
