# Lekki PostgreSQL pod smoke i lokalny dev (npm run dev:docker).
# Smoke: SMOKE_AUTO_DB=1 npm run smoke  |  Dev: npm run dev:docker
services:
  pg-smoke:
    image: postgres:16-alpine
    container_name: lama-smoke-pg
    environment:
      POSTGRES_USER: lama
      POSTGRES_PASSWORD: lama
      POSTGRES_DB: lamasmoke
    ports:
      - '54330:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lama -d lamasmoke']
      interval: 2s
      timeout: 5s
      retries: 20
