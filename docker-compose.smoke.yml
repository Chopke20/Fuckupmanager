# Lekki PostgreSQL tylko pod smoke / dev bez lokalnej bazy.
# Uruchom: SMOKE_AUTO_DB=1 npm run smoke  (Unix) lub set SMOKE_AUTO_DB=1 && npm run smoke (cmd)
services:
  pg-smoke:
    image: postgres:16-alpine
    container_name: lama-smoke-pg
    environment:
      POSTGRES_USER: lama
      POSTGRES_PASSWORD: lama
      POSTGRES_DB: lamasmoke
    ports:
      - '54330:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lama -d lamasmoke']
      interval: 2s
      timeout: 5s
      retries: 20
